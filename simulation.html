<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>Oregon Trail Simulation</title>
    <link rel="stylesheet" href="oregonTrail.css">
    <script src="oregonTrail.js"></script>
</head>
<body>
    <h1><b>Simulation</b></h1>
	<p id = "nameOutput"></p>
	<script>
		document.getElementById("nameOutput").innerHTML = name;
	</script>
	<div id="panel">
        <h2 id="header">Oregon Trail</h2>
		<p id = "day"></p>
		<p id = "health"></p>
		<p id = "left"></p>
		<p id = "traveled"></p>
		<p id="simDisplay"></p>
		<script>
			document.getElementById("day").innerHTML = "Day: " + day;
			document.getElementById("health").innerHTML = "Health: " + health;
			document.getElementById("left").innerHTML = "Miles Left: " + milesLeft;
			document.getElementById("traveled").innerHTML = "Miles Traveled: " + milesTraveled;
			document.getElementById("simDisplay").innerHTML = simDisplay;
		</script>
    </div>
	<div id= "simButtons">
		<input type="submit" value="Travel" id="question" class="button" style="display:block;" onclick="newQuestion()">
		<button class="button" onclick="goToNextPage('shop.html')">Buy More Materials</button>
		<button class= "button" onclick="goToNextPage('map.html')">Open Map</button>
	</div>
	<p id= "questions"><p>
	<div id= "sim">
		<button id = "option1"></button>
		<p>or</p>
		<button id = "option2"></button>
	</div>
	<body onload="resultRouting();"></body>
	<p id= "ending"></p>
	<div id="resultOutput"> <!-- The result will be displayed here -->
</body>
</html>
